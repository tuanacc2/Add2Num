<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Add2Num</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="grid grid-cols-1 lg:grid-cols-2 gap-8 font-mono bg-gradient-to-r from-black via-gray-950 to-gray-950 min-h-screen py-12 px-4 text-slate-100 antialiased selection:bg-blue-500 selection:text-white">

    <div class="w-full flex-1 flex flex-col justify-between">
        <div class="p-4">
            <h2
                class="text-2xl font-extrabold text-white mb-8 flex items-center gap-3">
                Add2Num
            </h2>

            <form id="calcForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Số thứ nhất (Num 1)</label>
                    <input type="text" id="num1" placeholder="Nhập chuỗi số nguyên" required
                        class="w-full max-w-lg break-all p-4 bg-slate-950/80 border border-slate-800 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 focus:outline-none font-mono text-xl tracking-widest text-white placeholder-slate-600 transition-all duration-200 shadow-inner">
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Số thứ hai (Num 2)</label>
                    <input type="text" id="num2" placeholder="Nhập chuỗi số nguyên" required
                        class="w-full max-w-lg break-all p-4 bg-slate-950/80 border border-slate-800 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 focus:outline-none font-mono text-xl tracking-widest text-white placeholder-slate-600 transition-all duration-200 shadow-inner">
                </div>

                <div class="flex items-center gap-4">
                    <button type="submit"
                        class="py-4 px-16 border text-white text-lg font-bold rounded-xl transition-all duration-300 hover:shadow-[0_0px_32px_rgba(79,70,229,0.5)] active:scale-[0.99] gap-2 tracking-wide cursor-pointer uppercase">
                        Tính
                    </button>
                    <button type="none" 
                        onclick="
                            document.getElementById('calcForm').reset(); 
                            document.getElementById('warning').classList.add('hidden');
                            ['num1', 'num2'].forEach(el => {
                                const field = document.getElementById(el);
                                field.classList.remove('border-red-400');
                                field.classList.add('border-slate-800');
                            });
                        "
                        class="py-4 px-8 border border-red-500 text-red-500 text-lg font-bold rounded-xl transition-all duration-300 hover:shadow-[0_0px_32px_rgba(79,70,229,0.5)] active:scale-[0.99] gap-2 tracking-wide cursor-pointer uppercase">
                        Xóa form
                    </button>
                </div>
                
                <p id="warning" class="hidden text-md font-bold tracking-wider text-red-500 pl-4 align-top"> Chỉ cho phép chữ số</p>
            </form>
        </div>

        <div id="resultContainer" class="hidden p-4">
            <label class="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-3 flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Đáp án từ Module JAR
            </label>
            <div id="finalResult"
                class="w-full max-w-lg break-all p-4 text-xl bg-emerald-950/30 border border-emerald-500/20 rounded-xl text-emerald-400 font-mono shadow-[inner_0_2px_8px_rgba(0,0,0,0.6)]">
            </div>
        </div>
    </div>

    <div id="consoleBoard"
        class="hidden w-full flex-1 p-8 flex flex-col min-h-[500px] relative overflow-hidden">
        <div id="animationZone"
            class="flex flex-col items-end font-mono text-4xl tracking-widest mb-6 space-y-3 hidden relative z-10">
            <div id="row1" class="flex gap-1.5 py-1 text-white text-2xl font-light transition-all duration-300"></div>
            <div id="row2"
                class="flex gap-1.5 py-1 border-b-2 border-slate-700 w-full justify-end relative text-white text-2xl font-light transition-all duration-300">
                <span class="absolute left-1 -top-1 text-white font-sans text-3xl font-medium">+</span>
            </div>
            <div id="rowResult" class="flex gap-1.5 py-1 text-white text-2xl font-medium transition-all duration-300"></div>
        </div>

        <div id="logConsole"
            class="flex-1 overflow-y-auto space-y-3 font-mono text-xs text-white border-t border-slate-900/60 pt-4 max-h-1/2 scrollbar-thin scrollbar-thumb-slate-800 relative z-10">
            <span class="text-white italic flex items-center gap-2">
            </span>
        </div>
    </div>

    <script>
        document.getElementById("calcForm").addEventListener("submit", function (event) {
            event.preventDefault();

            const en1 = document.getElementById("num1");
            const en2 = document.getElementById("num2");
            let n1 = en1.value;
            let n2 = en2.value;

            // Validate dữ liệu bẩn
            let isInvalid = /[^0-9]/.test(n1) || /[^0-9]/.test(n2);
            const warning = document.getElementById("warning");
            
            [en1, en2].forEach(el => {
                el.classList.toggle("border-red-400", isInvalid);
                el.classList.toggle("border-slate-800", !isInvalid);
            });

            if (isInvalid) {
                warning.classList.remove("hidden");
                return; 
            } 
            warning.classList.add("hidden");

            // Đệm số '0' để hiển thị giao diện hàng dọc chuẩn font-mono không bị lệch cột
            const maxLen = Math.max(n1.length, n2.length);
            const displayN1 = n1.padStart(maxLen, '0');
            const displayN2 = n2.padStart(maxLen, '0');

            const row1 = document.getElementById("row1");
            const row2 = document.getElementById("row2");
            const rowResult = document.getElementById("rowResult");
            const consoleBoard = document.getElementById("consoleBoard");
            const logConsole = document.getElementById("logConsole");
            const animationZone = document.getElementById("animationZone");
            const resultContainer = document.getElementById("resultContainer");

            consoleBoard.classList.remove("hidden");
            animationZone.classList.remove("hidden");
            resultContainer.classList.add("hidden");
            logConsole.innerHTML = '<div class="animate-fade-in"><span class="text-cyan-400 font-bold">[FETCHING]</span> Đang kết nối REST API...</div>';

            // RENDER khung tĩnh ban đầu dựa trên chuỗi đã đồng bộ độ dài bằng số '0'
            row1.innerHTML = displayN1.split('').map((ch, i) => `<span id="n1_${i}" class="px-1 text-white transition-all duration-300 rounded-md">${ch}</span>`).join('');
            row2.innerHTML = `<span class="absolute left-1 -top-1 text-white font-sans text-3xl font-medium">+</span>` +
                displayN2.split('').map((ch, i) => `<span id="n2_${i}" class="px-1 text-white transition-all duration-300 rounded-md">${ch}</span>`).join('');
            
            // Khung kết quả ban đầu tạm để trống
            rowResult.innerHTML = Array(maxLen).fill(0).map((_, i) => `<span id="res_${i}" class="px-1 text-white transition-all duration-300"></span>`).join('');

            const formData = new FormData();
            formData.append("num1", n1); // Gửi số gốc (đã trim) lên Backend
            formData.append("num2", n2);

            fetch('/calculate', { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    // data.result là đáp án thật (ví dụ: "100"), data.steps là mảng các bước log từ Backend
                    runVisualAnimation(displayN1, displayN2, data.steps, data.result);
                })
                .catch(error => {
                    logConsole.innerHTML = '<div class="text-red-500 font-bold">[FATAL ERROR] Không thể đồng bộ luồng với Backend.</div>';
                });
        });

        function runVisualAnimation(displayN1, displayN2, backendSteps, finalAns) {
            const logConsole = document.getElementById("logConsole");
            const resultContainer = document.getElementById("resultContainer");
            const finalResult = document.getElementById("finalResult");
            const rowResult = document.getElementById("rowResult");

            let stepIndex = 0;
            let len = displayN1.length;

            // Nếu kết quả dài hơn độ dài tối đa của 2 số (Ví dụ 99 + 1 = 100), thêm một ô nhớ leftover ở đầu hàng kết quả
            if (finalAns.length > len) {
                rowResult.insertAdjacentHTML('afterbegin', `<span id="res_leftover" class="px-1 text-transparent transition-all duration-300"></span>`);
            }

            function executeNextStep() {
                // Biến kiểm soát index chạy ngược từ phải qua trái của mảng giao diện
                let currIdx = len - 1 - stepIndex;

                // Nếu đã duyệt hết tất cả các hàng chữ số
                if (currIdx < 0) {
                    // Nếu có số nhớ cuối cùng tràn hàng
                    if (finalAns.length > len) {
                        const eLeftover = document.getElementById("res_leftover");
                        const line = document.createElement("div");
                        line.innerHTML = `<div><span class="text-orange-500 font-bold">[LEFTOVER]</span> Hạ số nhớ cuối cùng (${finalAns[0]}) xuống.</div>`;
                        logConsole.appendChild(line);
                        
                        setTimeout(() => {
                            eLeftover.innerText = finalAns[0];
                            eLeftover.className = "px-1 text-emerald-400 font-black bg-emerald-500/10 border border-emerald-500/30 rounded-md shadow-[0_0_15px_rgba(52,211,153,0.3)]";
                        }, 500);
                    }

                    // In nốt các dòng tổng kết nếu Backend có trả về thêm thông tin
                    while(stepIndex < backendSteps.length) {
                        const newLine = document.createElement("div");
                        newLine.innerHTML = `<div><span class="text-cyan-400 font-bold">[INFO]</span> ${backendSteps[stepIndex++]}</div>`;
                        logConsole.appendChild(newLine);
                    }
                    logConsole.scrollTop = logConsole.scrollHeight;

                    finishCalculation();
                    return;
                }

                const e1 = document.getElementById(`n1_${currIdx}`);
                const e2 = document.getElementById(`n2_${currIdx}`);
                const eRes = document.getElementById(`res_${currIdx}`);

                // Highlight cặp chữ số đang tính
                if (e1) e1.className = "px-1 text-yellow-400 font-bold scale-105 bg-slate-800 border border-cyan-500/50 rounded-md";
                if (e2) e2.className = "px-1 text-yellow-400 font-bold scale-105 bg-slate-800 border border-cyan-500/50 rounded-md";

                // Xuất log tương ứng của bước đó từ Backend lên màn hình console mô phỏng
                if (backendSteps && backendSteps[stepIndex]) {
                    const line = document.createElement("div");
                    line.innerHTML = `<div><span class="text-white font-bold">[STEP ${stepIndex + 1}]</span> ${backendSteps[stepIndex]}</div>`;
                    logConsole.appendChild(line);
                    logConsole.scrollTop = logConsole.scrollHeight;
                }

                setTimeout(() => {
                    // Điền chữ số kết quả chuẩn xác vào đúng ô theo vị trí hàng dọc (tính từ cuối chuỗi đáp án ngược lên)
                    let ansOffset = finalAns.length - 1 - stepIndex;
                    if (ansOffset >= 0) {
                        eRes.innerText = finalAns[ansOffset];
                        eRes.className = "px-1 text-emerald-400 font-black bg-emerald-500/10 border border-emerald-500/30 rounded-md shadow-[0_0_15px_rgba(52,211,153,0.3)]";
                    }

                    // Trả lại màu chữ tối cho các hàng số đã tính xong
                    if (e1) e1.className = "px-1 text-slate-600 border border-transparent";
                    if (e2) e2.className = "px-1 text-slate-600 border border-transparent";

                    stepIndex++;
                    setTimeout(executeNextStep, 500);
                }, 500);  
            }

            function finishCalculation() {
                const finalResult = document.getElementById("finalResult");
                logConsole.innerHTML += `<div class="text-green-400 mt-3 font-bold">[SUCCESS] Tiến trình hoàn tất.</div>`;
                finalResult.innerText = finalAns;
                resultContainer.classList.remove("hidden");
            }

            executeNextStep();
        }
    </script>

</body>

</html>
